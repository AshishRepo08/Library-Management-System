<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml" xlmns:th="http://www.thymeleaf.org" xmlns:xlmns="http://www.w3.org/1999/xhtml">

<head>
    <title>Library Management Platform</title>
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>
    <div class="login-container">
        <h1>Login</h1>

        <div class="error" th:if="${param.error}">
            Unable to login.Check your username and password.
        </div>
        <form method="POST" th:action="@{/login}" id="login-form" class="login-form">

            <div class="form-row">
                <label for="username">Username:</label>
                <input type="text" name="username" id="username" required autofocus>
            </div>

            <div class="form-row">
                <label for="password">Password:</label>
                <input type="password" name="password" id="password" required>
            </div>

            <button type="submit">Login</button>

        </form>
        <p class="register-link">
            New here? <a th:href="@{/register}">Create an account</a>
        </p>
    </div>
</body>
